name: ReconIQ CI

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:

  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"

  gitleaks:
    name: Secret Scan Gate
    runs-on: ubuntu-latest
    needs:
      - secret-scan
    if: always()
    steps:
      - name: Preserve required gitleaks check context
        run: |
          set -euo pipefail
          if [ "${{ needs.secret-scan.result }}" != "success" ]; then
            echo "Secret Scan (Gitleaks) failed." >&2
            exit 1
          fi

  python-unit-tests:
    name: Python Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: |
          pytest test_reconiq.py -v --cov=reconiq --cov-report=term-missing

  test:
    name: CI Gate
    runs-on: ubuntu-latest
    needs:
      - secret-scan
      - python-unit-tests
    if: always()
    steps:
      - name: Preserve required test check context
        run: |
          set -euo pipefail
          if [ "${{ needs.secret-scan.result }}" != "success" ]; then
            echo "Secret Scan (Gitleaks) failed." >&2
            exit 1
          fi
          if [ "${{ needs.python-unit-tests.result }}" != "success" ]; then
            echo "Python Unit Tests failed." >&2
            exit 1
          fi
          echo "All checks passed."
